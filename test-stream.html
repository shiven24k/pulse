<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Phase 3: Stream Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; }
        video { width: 100%; margin-top: 20px; background: #000; border-radius: 8px; }
    </style>
</head>
<body>
    <h2>Test Video Stream (Range Requests)</h2>
    
    <label>Video ID:</label>
    <input type="text" id="videoId" placeholder="69d105a1a35a675952250214">
    
    <label>JWT Token:</label>
    <input type="text" id="token" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjY5Y2ZmZGVjMmM5MjQxYzQ3ZWZmZmU0OSIsInJvbGUiOiJlZGl0b3IiLCJpYXQiOjE3NzUzMDQ5MjcsImV4cCI6MTc3NTkwOTcyN30.9pqUTRd9HqFYM0UMoHDHJK46kNbjBTAHaBW_VaAg5No">
    
    <button onclick="loadVideo()">Load Stream</button>

    <video id="player" controls></video>

    <script>
        function loadVideo() {
            const videoId = document.getElementById('videoId').value;
            const token = document.getElementById('token').value;
            const player = document.getElementById('player');
            
            if(!videoId || !token) return alert("Need both ID and Token!");

            // Set the source to our new streaming endpoint with the token in the URL
            player.src = `http://localhost:5000/videos/${videoId}/stream?token=${token}`;
        }
    </script>
</body>
</html>
